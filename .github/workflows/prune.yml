name: prune-failed-runs

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:
  workflow_run:
    workflows: ["windows", "macos", "linux"]
    types: [completed]

permissions:
  actions: write

jobs:
  prune:
    runs-on: ubuntu-24.04
    steps:
      - name: Keep only the latest run per workflow; delete the rest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          keep=$(gh run list --repo ${{ github.repository }} --limit 200 \
                  --json databaseId,name,createdAt,status \
                | jq -r '[ .[] | select(.status == "completed") ]
                         | group_by(.name)
                         | map(sort_by(.createdAt) | last | .databaseId) | .[]')
          all=$(gh run list --repo ${{ github.repository }} --limit 200 \
                  --status completed --json databaseId -q '.[].databaseId')
          for id in $all; do
            if ! echo "$keep" | grep -qx "$id"; then
              echo "deleting $id"
              gh run delete --repo ${{ github.repository }} "$id" || true
            else
              echo "keeping $id"
            fi
          done
