name: windows

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 30

    env:
      QT_VERSION: 6.7.3
      OPENSSL_VERSION: 3.3.2

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          cache: true
          cache-key-prefix: qt-${{ env.QT_VERSION }}-msvc

      - name: Install OpenSSL via vcpkg
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install openssl:x64-windows
          $root = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows"
          echo "OPENSSL_ROOT_DIR=$root" >> $env:GITHUB_ENV
          echo "$root\bin" >> $env:GITHUB_PATH

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -DOPENSSL_ROOT_DIR="$env:OPENSSL_ROOT_DIR" `
            -DNYX_BUILD_APP=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Verify
        run: |
          dir build
          if (!(Test-Path build/nyx.exe)) { exit 1 }
          dir build/*.dll | Select-Object Name

      - name: Smoke test (headless launch + auto-exit)
        shell: pwsh
        continue-on-error: true
        run: |
          $env:NYX_SCREENSHOT = "$PWD\smoke.png"
          $env:NYX_SCREEN     = "main"
          $env:QT_QPA_PLATFORM = "offscreen"
          $proc = Start-Process -FilePath "build\nyx.exe" -PassThru -NoNewWindow
          $exited = $proc.WaitForExit(20000)
          if (-not $exited) {
            Write-Host "smoke timeout (non-fatal) — killing"
            $proc.Kill()
          }
          if (Test-Path smoke.png) { Write-Host "screenshot captured"; dir smoke.png }

      - name: Package portable zip
        run: |
          $stage = "nyx-windows-x64"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item -Recurse -Path "build\*" -Destination $stage -Exclude "*.lib","*.pdb","*.exp","CMakeFiles","cmake_install.cmake","CMakeCache.txt","*.obj","_CPack_Packages","_deps"
          Compress-Archive -Path "$stage\*" -DestinationPath "nyx-windows-x64.zip"

      - name: Build NSIS installer
        run: |
          cd build
          cpack -G NSIS
          dir *.exe
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: nyx-windows-x64-portable
          path: nyx-windows-x64.zip
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: nyx-windows-installer
          path: build/Nyx-*-win64.exe
          if-no-files-found: warn
